version: "3.8"

services:
  backend:
    build: ./backend
    environment:
      - OPENWEATHER_API_KEY=889bfaa1e47c061e04e71e7701a9b633
    volumes:
      - ./backend/database.db:/app/database.db
    ports:
      - "20889:8000"
    restart: unless-stopped
    networks:
      - nav-network

  frontend:
    build: ./frontend
    ports:
      - "20888:80"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nav-network

networks:
  nav-network:
    driver: bridge